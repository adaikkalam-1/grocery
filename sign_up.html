<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up | Groca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      @keyframes float {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
        100% {
          transform: translateY(0px);
        }
      }
    </style>
  </head>
  <body
    class="bg-orange-50 min-h-screen flex items-center justify-center p-4 relative"
  >
    <div
      class="bg-white/70 backdrop-blur-xl w-full max-w-5xl rounded-md shadow-2xl shadow-green-900/10 overflow-hidden flex flex-col md:flex-row border border-white relative"
    >
      <div class="md:w-1/2 relative overflow-hidden group order-2 md:order-1">
        <div class="absolute inset-0 bg-black/10 z-10"></div>
        <img
          src="./assets/img/product_11.jpg"
          alt="Groceries"
          class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
        />

        <div
          class="relative z-20 h-full p-12 flex flex-col justify-end text-white"
        >
          <div
            class="bg-white/20 backdrop-blur-xs p-8 rounded-3xl border border-white/30 transform transition-all hover:translate-y-[-10px]"
          >
            <h2 class="text-4xl font-bold mb-4 leading-tight">
              Freshness <br />Delivered Daily
            </h2>
            <p class="text-white/80 text-lg">
              Join 10,000+ happy customers getting the best organic groceries at
              their doorstep.
            </p>
          </div>
        </div>

        <div class="absolute top-8 left-8 z-20 animate-float">
          <div
            class="bg-white/90 backdrop-blur-sm px-4 py-2 rounded-2xl shadow-lg flex items-center gap-2"
          >
            <span class="flex h-3 w-3 bg-green-500 rounded-full"></span>
            <span class="text-green-800 font-bold text-sm tracking-wide"
              >ORGANIC FRESH</span
            >
          </div>
        </div>
      </div>

      <div
        class="w-full md:w-1/2 p-4 sm:p-4 lg:p-10 flex flex-col justify-center order-1 md:order-2"
      >
        <div class="mb-4 flex flex-col items-center md:items-start">
          <h1 class="text-2xl mb-2 text-green-600">Create Account</h1>
        </div>

        <form class="space-y-6">
          <div class="space-y-4">
            <div
              class="relative border border-orange-800 rounded-md focus-within:border-orange-500"
            >
              <i
                class="fas fa-user absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"
              ></i>

              <input
                type="text"
                placeholder="Enter the name"
                class="w-full py-3 pl-14 pr-5 bg-transparent border-none outline-none focus:outline-none focus:ring-0 text-slate-700"
                required
              />
            </div>

            <div
              class="relative border border-orange-800 rounded-md focus-within:border-orange-500"
            >
              <i
                class="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"
              ></i>

              <input
                type="email"
                placeholder="Email Address"
                class="w-full py-3 pl-14 pr-5 bg-transparent border-none outline-none focus:outline-none focus:ring-0 text-slate-700"
                required
              />
            </div>

            <div
              class="relative border border-orange-800 rounded-md focus-within:border-orange-500"
            >
              <i
                class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"
              ></i>

              <input
                type="password"
                placeholder="Password"
                class="w-full py-3 pl-14 pr-5 bg-transparent border-none outline-none focus:outline-none focus:ring-0 text-slate-700"
                required
              />
              <button
                type="button"
                class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-green-500 transition"
              >
                <i class="fas fa-eye-slash"></i>
              </button>
            </div>
            <div
              class="relative border border-orange-800 rounded-md focus-within:border-orange-500"
            >
              <i
                class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"
              ></i>

              <input
                type="password"
                placeholder="Confirm Password"
                class="w-full py-3 pl-14 pr-5 bg-transparent border-none outline-none focus:outline-none focus:ring-0 text-slate-700"
                required
              />
              <button
                type="button"
                class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-green-500 transition"
              >
                <i class="fas fa-eye-slash"></i>
              </button>
            </div>
          </div>

          <button
            type="submit"
            class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-md shadow-xl shadow-green-200 transition-all hover:scale-[1.02] active:scale-95 text-lg"
          >
            <a href="./index.html"> Sign Up </a>
          </button>

          <p class="text-center text-slate-500">
            Already have an account?
            <a
              href="./login.html"
              class="text-orange-500 hover:text-orange-600 transition ml-1 underline underline-offset-4"
              >Login</a
            >
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
